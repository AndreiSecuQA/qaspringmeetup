<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </radialGradient>

    <!-- Outer ring glow -->
    <filter id="glowOuter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit dot glow -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to square (full bleed) -->
    <clipPath id="squareClip">
      <rect width="1080" height="1080"/>
    </clipPath>

    <!-- Teal gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e8c8"/>
      <stop offset="100%" stop-color="#00b89e"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e8c8"/>
      <stop offset="50%" stop-color="#00c4a8"/>
      <stop offset="100%" stop-color="#008f7a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00e8c8" stroke-width="1">
    <!-- Horizontal lines -->
    <line x1="0" y1="135" x2="1080" y2="135"/>
    <line x1="0" y1="270" x2="1080" y2="270"/>
    <line x1="0" y1="405" x2="1080" y2="405"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="675" x2="1080" y2="675"/>
    <line x1="0" y1="810" x2="1080" y2="810"/>
    <line x1="0" y1="945" x2="1080" y2="945"/>
    <!-- Vertical lines -->
    <line x1="135" y1="0" x2="135" y2="1080"/>
    <line x1="270" y1="0" x2="270" y2="1080"/>
    <line x1="405" y1="0" x2="405" y2="1080"/>
    <line x1="540" y1="0" x2="540" y2="1080"/>
    <line x1="675" y1="0" x2="675" y2="1080"/>
    <line x1="810" y1="0" x2="810" y2="1080"/>
    <line x1="945" y1="0" x2="945" y2="1080"/>
  </g>

  <!-- Circuit traces - decorative background elements -->
  <g opacity="0.12" stroke="#00e8c8" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Top-left traces -->
    <polyline points="80,200 140,200 140,140 220,140"/>
    <polyline points="80,310 160,310 160,260 260,260"/>
    <polyline points="120,80 120,160 200,160"/>
    <!-- Top-right traces -->
    <polyline points="1000,200 940,200 940,140 860,140"/>
    <polyline points="1000,310 920,310 920,260 820,260"/>
    <polyline points="960,80 960,160 880,160"/>
    <!-- Bottom-left traces -->
    <polyline points="80,880 140,880 140,940 220,940"/>
    <polyline points="80,770 160,770 160,820 260,820"/>
    <polyline points="120,1000 120,920 200,920"/>
    <!-- Bottom-right traces -->
    <polyline points="1000,880 940,880 940,940 860,940"/>
    <polyline points="1000,770 920,770 920,820 820,820"/>
    <polyline points="960,1000 960,920 880,920"/>
  </g>

  <!-- Circuit dots -->
  <g opacity="0.25" fill="#00e8c8">
    <!-- Top-left -->
    <circle cx="140" cy="200" r="5"/>
    <circle cx="220" cy="140" r="4"/>
    <circle cx="160" cy="310" r="5"/>
    <circle cx="120" cy="160" r="4"/>
    <!-- Top-right -->
    <circle cx="940" cy="200" r="5"/>
    <circle cx="860" cy="140" r="4"/>
    <circle cx="920" cy="310" r="5"/>
    <circle cx="960" cy="160" r="4"/>
    <!-- Bottom-left -->
    <circle cx="140" cy="880" r="5"/>
    <circle cx="220" cy="940" r="4"/>
    <circle cx="160" cy="770" r="5"/>
    <circle cx="120" cy="920" r="4"/>
    <!-- Bottom-right -->
    <circle cx="940" cy="880" r="5"/>
    <circle cx="860" cy="940" r="4"/>
    <circle cx="920" cy="770" r="5"/>
    <circle cx="960" cy="920" r="4"/>
  </g>

  <!-- Outer decorative ring (subtle) -->
  <circle cx="540" cy="540" r="430" fill="none" stroke="#00e8c8" stroke-width="1" opacity="0.08"/>

  <!-- Mid ring -->
  <circle cx="540" cy="540" r="390" fill="none" stroke="#00e8c8" stroke-width="1" opacity="0.06"/>

  <!-- Dark card / inner background -->
  <circle cx="540" cy="540" r="360" fill="#0a1828" opacity="0.9"/>

  <!-- Main glowing ring -->
  <circle cx="540" cy="540" r="355" fill="none" stroke="url(#ringGrad)" stroke-width="8" opacity="0.9" filter="url(#glowOuter)"/>

  <!-- Inner ring accent -->
  <circle cx="540" cy="540" r="340" fill="none" stroke="#00e8c8" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner accent dots on ring -->
  <g filter="url(#dotGlow)" fill="#00e8c8">
    <circle cx="540" cy="185" r="8" opacity="0.9"/>
    <circle cx="540" cy="895" r="8" opacity="0.9"/>
    <circle cx="185" cy="540" r="8" opacity="0.9"/>
    <circle cx="895" cy="540" r="8" opacity="0.9"/>
    <!-- Diagonal -->
    <circle cx="288" cy="288" r="5" opacity="0.6"/>
    <circle cx="792" cy="288" r="5" opacity="0.6"/>
    <circle cx="288" cy="792" r="5" opacity="0.6"/>
    <circle cx="792" cy="792" r="5" opacity="0.6"/>
  </g>

  <!-- QA Text -->
  <text
    x="540"
    y="540"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="320"
    letter-spacing="-8"
    fill="url(#textGrad)"
    filter="url(#glowText)"
  >QA</text>
</svg>
