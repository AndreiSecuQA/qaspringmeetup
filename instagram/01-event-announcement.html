<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Spring Meetup 2026 — Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #040e1a;
      font-family: 'Inter', sans-serif;
    }

    /* Scale wrapper so the 1080×1080 card fits on screen */
    .preview-wrap {
      transform: scale(0.46);
      transform-origin: top left;
      width: 1080px;
      height: 1080px;
    }

    .card {
      width: 1080px;
      height: 1080px;
      background: #071428;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 70px;
    }

    /* Dot grid background */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,200,160,0.18) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* Top accent line */
    .accent-line-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, #00c8a0, transparent);
    }

    /* Bottom accent line */
    .accent-line-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, #00c8a0, transparent);
    }

    /* Side glow orbs */
    .orb-left {
      position: absolute;
      left: -120px;
      top: 50%;
      transform: translateY(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,160,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .orb-right {
      position: absolute;
      right: -100px;
      bottom: 100px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,100,200,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Branding row */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 52px;
      z-index: 1;
    }

    .qa-logo {
      width: 72px;
      height: 72px;
      border: 3px solid #00c8a0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: #00c8a0;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .brand-text {
      font-size: 26px;
      font-weight: 700;
      color: #8ca0b8;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Main content */
    .main-content {
      text-align: center;
      z-index: 1;
    }

    .event-label {
      font-size: 20px;
      font-weight: 600;
      color: #00c8a0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .event-title {
      font-size: 100px;
      font-weight: 900;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: -3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .event-title span {
      color: #00c8a0;
    }

    .event-subtitle {
      font-size: 28px;
      font-weight: 500;
      color: #8ca0b8;
      margin-top: 20px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .event-theme {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 52px;
      line-height: 1.3;
    }

    /* Pill badges */
    .pills {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(0,200,160,0.12);
      border: 1.5px solid rgba(0,200,160,0.4);
      border-radius: 100px;
      padding: 14px 36px;
      font-size: 24px;
      font-weight: 700;
      color: #00c8a0;
      letter-spacing: 0.06em;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 1;
    }

    .cta-text {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .cta-text span {
      color: #00c8a0;
    }

    .handle {
      font-size: 22px;
      font-weight: 600;
      color: #8ca0b8;
      letter-spacing: 0.04em;
    }

    /* Horizontal teal decorative lines */
    .deco-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,160,0.3), transparent);
      left: 10%;
      right: 10%;
    }
    .deco-line-1 { top: 160px; }
    .deco-line-2 { bottom: 150px; }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <div class="card">
      <div class="accent-line-top"></div>
      <div class="accent-line-bottom"></div>
      <div class="orb-left"></div>
      <div class="orb-right"></div>
      <div class="deco-line deco-line-1"></div>
      <div class="deco-line deco-line-2"></div>

      <!-- Branding -->
      <div class="brand-row">
        <div class="qa-logo">QA</div>
        <div class="brand-text">QA Moldova Community</div>
      </div>

      <!-- Main -->
      <div class="main-content">
        <div class="event-label">Eveniment Comunitar · Free</div>
        <div class="event-title">QA <span>Spring</span><br>Meetup</div>
        <div class="event-subtitle">QA between Expectations and Reality</div>
        <div class="event-theme">The Ideal Candidate in 2026</div>

        <div class="pills">
          <div class="pill">25 APRILIE</div>
          <div class="pill">11:00</div>
          <div class="pill">UTM Chișinău</div>
        </div>
      </div>

      <!-- Bottom -->
      <div class="bottom-row">
        <div class="cta-text">Înregistrare <span>Gratuită</span> · Link în bio</div>
        <div class="handle">@qacommunitymoldova</div>
      </div>
    </div>
  </div>
</body>
</html>
