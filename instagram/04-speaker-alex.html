<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaker — Alex Ursu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #040e1a;
      font-family: 'Inter', sans-serif;
    }

    .preview-wrap {
      transform: scale(0.46);
      transform-origin: top left;
      width: 1080px;
      height: 1080px;
    }

    .card {
      width: 1080px;
      height: 1080px;
      background: #071428;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    .text-panel {
      width: 60%;
      height: 100%;
      padding: 70px 60px 60px 70px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .text-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(245,158,11,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .separator {
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100%;
      background: linear-gradient(90deg, #071428 0%, transparent 100%);
      z-index: 3;
    }

    .photo-panel {
      width: 40%;
      height: 100%;
      position: relative;
      flex-shrink: 0;
    }

    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    .photo-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #071428 0%, transparent 40%),
                  linear-gradient(0deg, rgba(7,20,40,0.5) 0%, transparent 50%);
    }

    /* Workshop accent: gold/amber instead of teal */
    .accent-line-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #f59e0b 0%, rgba(245,158,11,0.3) 60%, transparent 100%);
      z-index: 10;
    }

    .panel-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .qa-logo {
      width: 56px;
      height: 56px;
      border: 2.5px solid #f59e0b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 17px;
      color: #f59e0b;
      flex-shrink: 0;
    }

    .meet-label {
      font-size: 18px;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .speaker-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0;
    }

    .workshop-badge {
      display: inline-flex;
      background: rgba(245,158,11,0.15);
      border: 1.5px solid rgba(245,158,11,0.5);
      border-radius: 8px;
      padding: 8px 22px;
      font-size: 16px;
      font-weight: 800;
      color: #f59e0b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .speaker-name {
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }

    .speaker-role {
      font-size: 24px;
      font-weight: 600;
      color: #8ca0b8;
      margin-bottom: 6px;
    }

    .speaker-company {
      font-size: 24px;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 44px;
    }

    .topic-box {
      background: rgba(245,158,11,0.07);
      border-left: 4px solid #f59e0b;
      border-radius: 0 12px 12px 0;
      padding: 22px 28px;
    }

    .topic-box p {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.5;
      font-style: italic;
    }

    .bottom-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .event-date {
      font-size: 18px;
      font-weight: 700;
      color: #8ca0b8;
    }

    .event-date span {
      color: #f59e0b;
    }

    .handle {
      font-size: 16px;
      font-weight: 600;
      color: #8ca0b8;
    }

    .deco-line {
      position: absolute;
      left: 0;
      right: 40%;
      height: 1px;
      background: linear-gradient(90deg, rgba(245,158,11,0.4), transparent);
    }
    .deco-line-top { top: 120px; }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <div class="card">
      <div class="accent-line-top"></div>
      <div class="deco-line deco-line-top"></div>

      <div class="text-panel">
        <div class="panel-content">
          <div class="brand-row">
            <div class="qa-logo">QA</div>
            <div class="meet-label">Workshop Speaker</div>
          </div>

          <div class="speaker-main">
            <div class="workshop-badge">🛠️ Workshop</div>
            <div class="speaker-name">Alex<br>Ursu</div>
            <div class="speaker-role">QA Manager</div>
            <div class="speaker-company">Planable</div>
            <div class="topic-box">
              <p>"Workshop Practic: Tooling Modern în QA — demonstrații live cu tooling modern de testare și automatizare"</p>
            </div>
          </div>

          <div class="bottom-info">
            <div class="event-date"><span>25 Aprilie 2026</span> · 12:00 · UTM</div>
            <div class="handle">@qacommunitymoldova</div>
          </div>
        </div>
        <div class="separator"></div>
      </div>

      <div class="photo-panel">
        <img src="../images/alex-ursu.jpg" alt="Alex Ursu" />
      </div>
    </div>
  </div>
</body>
</html>
